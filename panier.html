<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panier  Zynk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000;
      --white: #fff;
      --acid: #D4FF00;
      --card-bg: #0f0f0f;
      --border: #1c1c1c;
      --muted: #555;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      letter-spacing: 0.01em;
      overflow-x: hidden;
    }

    /*  HEADER  */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 32px;
      height: 60px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 300;
    }

    .header-left { display: flex; align-items: center; gap: 20px; }

    .menu-btn {
      display: flex; flex-direction: column; gap: 5px;
      cursor: pointer; padding: 4px;
    }
    .menu-btn span {
      display: block; width: 22px; height: 1.5px;
      background: var(--white);
      transition: transform 0.3s, opacity 0.3s;
    }
    .menu-btn.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .menu-btn.open span:nth-child(2) { opacity: 0; }
    .menu-btn.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 4px;
      color: var(--white);
      text-decoration: none;
    }

    .header-right { display: flex; align-items: center; gap: 20px; }

    .cart-btn {
      background: none; border: none; color: var(--white);
      cursor: pointer; font-size: 18px;
      position: relative;
    }
    .cart-count {
      position: absolute;
      top: -6px; right: -8px;
      background: var(--acid);
      color: var(--black);
      font-size: 9px;
      font-weight: 700;
      width: 16px; height: 16px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    /*  SIDEBAR  */
    .sidebar {
      position: fixed;
      top: 0; left: -280px;
      width: 260px; height: 100%;
      background: #080808;
      border-right: 1px solid var(--border);
      padding: 80px 0 40px;
      transition: left 0.35s cubic-bezier(.4,0,.2,1);
      z-index: 200;
    }
    .sidebar.active { left: 0; }

    .sidebar-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 150;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .sidebar-overlay.active { opacity: 1; pointer-events: all; }

    .sidebar nav a {
      display: block;
      padding: 14px 32px;
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s, padding-left 0.2s;
      border-bottom: 1px solid var(--border);
    }
    .sidebar nav a:hover {
      color: var(--white);
      padding-left: 40px;
    }

    /*  CONTENT  */
    .cart-content {
      padding: 100px 32px;
      max-width: 1000px;
      margin: 0 auto;
      margin-top: 20px;
    }

    .cart-header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
      margin-bottom: 40px;
    }

    .cart-title {
      font-family: 'Oswald', sans-serif;
      font-size: 36px;
      letter-spacing: 3px;
      color: var(--white);
      margin-bottom: 8px;
    }

    .cart-info {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .cart-items {
      margin-bottom: 40px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }

    .item-info {
      flex: 1;
    }

    .item-name {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .item-price {
      font-size: 12px;
      color: var(--acid);
      font-weight: 600;
    }

    .item-size {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .item-remove {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 16px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: background 0.2s, color 0.2s;
      margin-left: 20px;
    }

    .item-remove:hover {
      background: #ff2d55;
      border-color: #ff2d55;
      color: var(--white);
    }

    .cart-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .cart-empty p {
      font-size: 16px;
      margin-bottom: 20px;
    }

    .cart-summary {
      border-top: 1px solid var(--border);
      padding-top: 20px;
      margin-bottom: 40px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      font-size: 14px;
    }

    .summary-total {
      font-size: 18px;
      font-weight: 600;
      color: var(--acid);
      border-top: 1px solid var(--border);
      padding-top: 15px;
      margin-top: 15px;
    }

    .cart-actions {
      display: flex;
      gap: 20px;
      margin-top: 40px;
    }

    .btn {
      flex: 1;
      padding: 16px;
      border: 1px solid var(--white);
      color: var(--white);
      text-decoration: none;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      background: none;
      transition: background 0.25s, color 0.25s;
    }

    .btn:hover {
      background: var(--acid);
      border-color: var(--acid);
      color: var(--black);
    }

    .btn-checkout {
      background: var(--acid);
      border-color: var(--acid);
      color: var(--black);
    }

    .btn-checkout:hover {
      background: #fff;
      border-color: #fff;
    }

    @media (max-width: 600px) {
      header { padding: 0 20px; }
      .cart-content { padding: 80px 16px; }
      .cart-item { flex-direction: column; align-items: flex-start; }
      .item-remove { margin-left: 0; margin-top: 12px; width: 100%; }
      .cart-actions { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- OVERLAY -->
  <div class="sidebar-overlay" id="overlay" onclick="closeMenu()"></div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="menu">
    <nav>
      <a href="index.html" onclick="closeMenu()">Accueil</a>
      <a href="index.html#pulls" onclick="closeMenu()">Pulls</a>
      <a href="index.html#vestes" onclick="closeMenu()">Vestes</a>
      <a href="index.html#tshirts" onclick="closeMenu()">T-shirts</a>
    </nav>
    <div class="sidebar-footer"> 2025 Zynk</div>
  </div>

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="menu-btn" id="menuBtn" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </div>
      <a href="index.html" class="logo">Zynk</a>
    </div>
    <div class="header-right">
      <button class="cart-btn" aria-label="Panier" onclick="openCart()">
        🛒
        <span class="cart-count">0</span>
      </button>
    </div>
  </header>

  <!-- CONTENU PANIER -->
  <main class="cart-content">
    <div class="cart-header">
      <h1 class="cart-title" data-i18n="cart-title">Panier</h1>
      <p class="cart-info" id="cartInfo" data-i18n="cart-info-empty">0 article</p>
    </div>

    <div class="cart-items" id="cartItems"></div>

    <div class="cart-summary" id="cartSummary" style="display: none;">
      <div class="summary-row">
        <span data-i18n="subtotal-label">Sous-total</span>
        <span id="subtotal">0 
      </div>
      <div class="summary-row">
        <span data-i18n="shipping-label">Frais de port</span>
        <span data-i18n="shipping-value">Gratuit</span>
      </div>
      <div class="summary-total">
        <span data-i18n="total-label">Total: </span>
        <span id="total">0 
      </div>
    </div>

    <div class="cart-terms" id="cartTerms" style="display: none; margin-bottom: 30px; padding: 16px; background: rgba(212, 255, 0, 0.05); border: 1px solid var(--border); border-radius: 4px; text-align: center; font-size: 12px; color: var(--muted);">
      En effectuant votre achat, vous acceptez notre <a href="charte-vente.html" style="color: var(--acid); text-decoration: none; font-weight: 600;">charte de vente</a>
    </div>

    <div class="cart-actions" id="cartActions">
      <a href="index.html" class="btn" data-i18n="btn-continue">Continuer shopping</a>
      <button class="btn btn-checkout" id="checkoutBtn" style="display: none;" data-i18n="btn-checkout">Passer commande</button>
    </div>
  </main>

  <script>
    // Translations Dictionary
    const translations = {
      fr: {
        'cart-title': 'Panier',
        'cart-info-empty': '0 article',
        'cart-empty-msg': 'Votre panier est vide',
        'cart-empty-submsg': 'Explorez notre collection et ajoutez des articles à votre panier',
        'subtotal-label': 'Sous-total',
        'shipping-label': 'Frais de port',
        'shipping-value': 'Gratuit',
        'total-label': 'Total: ',
        'btn-continue': 'Continuer shopping',
        'btn-checkout': 'Passer commande',
        'btn-remove': 'Retirer',
        'footer-copy': ' 2025 Zynk. Tous droits réservés.'
      },
      en: {
        'cart-title': 'Cart',
        'cart-info-empty': '0 items',
        'cart-empty-msg': 'Your cart is empty',
        'cart-empty-submsg': 'Explore our collection and add items to your cart',
        'subtotal-label': 'Subtotal',
        'shipping-label': 'Shipping',
        'shipping-value': 'Free',
        'total-label': 'Total: ',
        'btn-continue': 'Continue shopping',
        'btn-checkout': 'Checkout',
        'btn-remove': 'Remove',
        'footer-copy': ' 2025 Zynk. All rights reserved.'
      }
    };

    function applyTranslations(lang) {
      const trans = translations[lang];
      Object.keys(trans).forEach(key => {
        const elements = document.querySelectorAll(`[data-i18n="${key}"]`);
        elements.forEach(element => {
          element.textContent = trans[key];
        });
      });
    }

    function initLanguage() {
      const savedLanguage = localStorage.getItem('selectedLanguage') || 'fr';
      applyTranslations(savedLanguage);
    }

    document.addEventListener('DOMContentLoaded', function() {
      initLanguage();
    });

    // Currency Management
    const EUR_TO_USD = 1.13;

    function getCurrency() {
      return localStorage.getItem('selectedCurrency') || 'eur';
    }

    function convertPrice(priceText) {
      const currency = getCurrency();
      const amount = parseFloat(priceText.replace(/[^0-9.]/g, '').replace(',', '.').trim());

      if (currency === 'usd') {
        const converted = Math.round(amount * EUR_TO_USD * 100) / 100;
        return converted + ' $';
      }
      return amount + ' €';
    }

    function convertAmount(amount) {
      const currency = getCurrency();
      if (currency === 'usd') {
        const converted = Math.round(amount * EUR_TO_USD * 100) / 100;
        return converted + ' $';
      }
      return amount.toFixed(2) + ' €';
    }

    // Menu
    function toggleMenu() {
      const menu = document.getElementById('menu');
      const btn = document.getElementById('menuBtn');
      const overlay = document.getElementById('overlay');
      menu.classList.toggle('active');
      btn.classList.toggle('open');
      overlay.classList.toggle('active');
    }
    function closeMenu() {
      document.getElementById('menu').classList.remove('active');
      document.getElementById('menuBtn').classList.remove('open');
      document.getElementById('overlay').classList.remove('active');
    }

    // Panier
    function getCart() {
      const cart = localStorage.getItem('cart');
      return cart ? JSON.parse(cart) : [];
    }

    function saveCart(cart) {
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    function removeFromCart(id) {
      let cart = getCart();
      cart = cart.filter(item => item.id !== id);
      saveCart(cart);
      displayCart();
    }

    function displayCart() {
      const cart = getCart();
      const cartItems = document.getElementById('cartItems');
      const cartInfo = document.getElementById('cartInfo');
      const cartSummary = document.getElementById('cartSummary');
      const cartTerms = document.getElementById('cartTerms');
      const checkoutBtn = document.getElementById('checkoutBtn');
      const subtotalEl = document.getElementById('subtotal');
      const totalEl = document.getElementById('total');
      const cartCount = document.querySelector('.cart-count');

      cartCount.textContent = cart.length;

      if (cart.length === 0) {
        const lang = localStorage.getItem('selectedLanguage') || 'fr';
        const emptyMsg = translations[lang]['cart-empty-msg'];
        const emptySubmsg = translations[lang]['cart-empty-submsg'];
        cartItems.innerHTML = `<div class="cart-empty"><p>${emptyMsg}</p><p style="font-size: 12px; color: var(--muted);">${emptySubmsg}</p></div>`;
        cartInfo.textContent = translations[lang]['cart-info-empty'];
        cartSummary.style.display = 'none';
        cartTerms.style.display = 'none';
        checkoutBtn.style.display = 'none';
        return;
      }

      const lang = localStorage.getItem('selectedLanguage') || 'fr';
      cartInfo.textContent = cart.length + (lang === 'en' ? ' item' : ' article') + (cart.length > 1 ? (lang === 'en' ? 's' : 's') : '');
      const sizeLabel = lang === 'fr' ? 'Taille:' : 'Size:';
      const removeText = translations[lang]['btn-remove'];
      cartItems.innerHTML = cart.map(item => `
        <div class="cart-item">
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-price">${convertPrice(item.price)}</div>
            <div class="item-size">${sizeLabel} ${item.size}</div>
          </div>
          <button class="item-remove" onclick="removeFromCart(${item.id})">${removeText}</button>
        </div>
      `).join('');

      // Calculer le total
      const total = cart.reduce((sum, item) => {
        const price = parseFloat(item.price.replace(/[^0-9.]/g, ''));
        return sum + price;
      }, 0);

      subtotalEl.textContent = convertAmount(total);
      totalEl.textContent = convertAmount(total);
      cartSummary.style.display = 'block';
      cartTerms.style.display = 'block';
      checkoutBtn.style.display = 'block';
    }

    function openCart() {
      // DéjÃ  sur la page du panier
    }

    // Afficher le panier au chargement
    displayCart();
  </script>

</body>
</html>
