<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zynk â€“ Streetwear Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000;
      --white: #fff;
      --acid: #D4FF00;
      --card-bg: #0f0f0f;
      --border: #1c1c1c;
      --muted: #555;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      letter-spacing: 0.01em;
      overflow-x: hidden;
    }

    /* ─── HEADER ─── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 32px;
      height: 60px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 300;
    }

    .header-left { display: flex; align-items: center; gap: 20px; }

    .menu-btn {
      display: flex; flex-direction: column; gap: 5px;
      cursor: pointer; padding: 4px;
    }
    .menu-btn span {
      display: block; width: 22px; height: 1.5px;
      background: var(--white);
      transition: transform 0.3s, opacity 0.3s;
    }
    .menu-btn.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .menu-btn.open span:nth-child(2) { opacity: 0; }
    .menu-btn.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 4px;
      color: var(--white);
    }

    .header-right { display: flex; align-items: center; gap: 16px; }

    .search-container {
      display: flex;
      align-items: center;
      background: transparent;
      border: 1px solid var(--white);
      border-radius: 6px;
      padding: 0 8px;
      transition: border-color 0.25s;
    }

    .search-container:focus-within {
      border-color: var(--acid);
    }

    .search-input {
      background: transparent;
      border: none;
      color: var(--white);
      font-size: 13px;
      padding: 8px 8px;
      width: 150px;
      font-family: 'Inter', sans-serif;
      outline: none;
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    .search-btn {
      background: none;
      border: none;
      color: var(--white);
      cursor: pointer;
      font-size: 16px;
      transition: color 0.2s;
      padding: 4px 4px;
    }

    .search-btn:hover {
      color: var(--acid);
    }

    .cart-btn {
      background: none; border: none; color: var(--white);
      cursor: pointer; font-size: 18px;
      position: relative;
      transition: color 0.2s;
    }
    .cart-btn:hover {
      color: var(--acid);
    }
    .cart-count {
      position: absolute;
      top: -6px; right: -8px;
      background: var(--acid);
      color: var(--black);
      font-size: 9px;
      font-weight: 700;
      width: 16px; height: 16px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    .account-btn {
      background: none; border: none; color: var(--white);
      cursor: pointer; font-size: 18px;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      outline: none;
    }
    .account-btn:hover svg {
      stroke: var(--acid);
    }
    .account-btn:focus {
      outline: none;
    }

    .account-menu {
      position: relative;
    }

    .account-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      min-width: 200px;
      margin-top: 8px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: opacity 0.25s, visibility 0.25s, transform 0.25s;
      z-index: 400;
    }

    .account-menu.active .account-dropdown {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .account-dropdown-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    .account-dropdown-name {
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .account-dropdown-email {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
    }

    .account-dropdown-item {
      display: block;
      width: 100%;
      padding: 12px 16px;
      background: none;
      border: none;
      color: var(--white);
      text-align: left;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s, color 0.2s;
      border-bottom: 1px solid var(--border);
    }

    .account-dropdown-item:hover {
      background: rgba(212, 255, 0, 0.1);
      color: var(--acid);
    }

    .account-dropdown-item:last-child {
      border-bottom: none;
    }

    .account-dropdown-item[href] {
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--white);
      transition: background 0.2s, color 0.2s;
    }

    .account-dropdown-item[href]:hover {
      background: rgba(212, 255, 0, 0.1);
      color: var(--acid);
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      position: fixed;
      top: 0; left: -280px;
      width: 260px; height: 100%;
      background: #080808;
      border-right: 1px solid var(--border);
      padding: 80px 0 40px;
      transition: left 0.35s cubic-bezier(.4,0,.2,1);
      z-index: 200;
    }
    .sidebar.active { left: 0; }

    .sidebar-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 150;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .sidebar-overlay.active { opacity: 1; pointer-events: all; }

    .sidebar nav a {
      display: block;
      padding: 14px 32px;
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s, padding-left 0.2s;
      border-bottom: 1px solid var(--border);
    }
    .sidebar nav a:hover {
      color: var(--white);
      padding-left: 40px;
    }

    .sidebar-footer {
      position: absolute;
      bottom: 32px; left: 32px;
      font-size: 11px; color: var(--muted);
    }

    /* ─── HERO ─── */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      padding: 80px 20px 0;
      background-image: url('image/tag.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* grain background */
    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 80px;
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      background-size: 200px;
      opacity: 0.35;
      z-index: 0;
    }

    .hero-content { position: relative; z-index: 1; }

    .hero-eyebrow {
      font-size: 10px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--acid);
      margin-bottom: 16px;
    }

    .hero-title {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(110px, 22vw, 260px);
      font-weight: 700;
      line-height: 0.85;
      letter-spacing: -3px;
      text-transform: uppercase;
      margin: 0;
      /* glitch-ready */
      position: relative;
    }

    /* glitch effect */
    .hero-title::before,
    .hero-title::after {
      content: 'ZYNK';
      position: absolute;
      top: 0; left: 0; right: 0;
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      letter-spacing: -3px;
      text-transform: uppercase;
    }
    .hero-title::before {
      color: var(--acid);
      clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
      animation: glitch-top 4s infinite linear;
    }
    .hero-title::after {
      color: #ff2d55;
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
      animation: glitch-bot 4s infinite linear;
    }

    @keyframes glitch-top {
      0%, 90%, 100% { transform: translateX(0); opacity: 0; }
      92% { transform: translateX(-4px); opacity: 0.8; }
      94% { transform: translateX(4px); opacity: 0.8; }
      96% { transform: translateX(0); opacity: 0; }
    }
    @keyframes glitch-bot {
      0%, 90%, 100% { transform: translateX(0); opacity: 0; }
      93% { transform: translateX(4px); opacity: 0.8; }
      95% { transform: translateX(-4px); opacity: 0.8; }
      97% { transform: translateX(0); opacity: 0; }
    }

    .hero-sub {
      margin-top: 20px;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .hero-cta {
      margin-top: 80px;
      display: inline-block;
      padding: 14px 40px;
      border: 1px solid var(--white);
      color: var(--white);
      text-decoration: none;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: background 0.25s, color 0.25s, border-color 0.25s;
    }
    .hero-cta:hover {
      background: var(--acid);
      border-color: var(--acid);
      color: var(--black);
    }

    .hero-scroll {
      position: absolute;
      bottom: 36px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center;
      gap: 8px;
      font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--white);
      animation: bob 2s ease-in-out infinite;
    }
    .hero-scroll::after {
      content: '';
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, var(--white), transparent);
    }
    @keyframes bob {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(6px); }
    }

    /* ─── SIDEBAR CATALOGUE ─── */
    .sidebar-catalogue {
      border-top: 1px solid var(--border);
      margin-top: 20px;
      padding-top: 20px;
    }

    .sidebar-cat-toggle {
      display: block;
      width: 100%;
      padding: 14px 32px;
      background: none;
      border: none;
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s, padding-left 0.2s;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-family: 'Inter', sans-serif;
    }
    .sidebar-cat-toggle:hover {
      color: var(--white);
      padding-left: 40px;
    }
    .sidebar-cat-toggle::after {
      content: ' ▼';
      font-size: 9px;
      transition: transform 0.3s;
    }
    .sidebar-cat-toggle.active::after {
      transform: rotate(180deg);
    }

    .sidebar-products {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(.4,0,.2,1);
    }
    .sidebar-products.active {
      max-height: 500px;
    }

    .sidebar-products a {
      display: block;
      padding: 10px 32px 10px 48px;
      color: var(--muted);
      text-decoration: none;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-products a:hover {
      color: var(--white);
    }

    .sidebar-link {
      display: block;
      padding: 14px 32px;
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s, padding-left 0.2s;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-link:hover {
      color: var(--white);
      padding-left: 40px;
    }

    /* ─── SECTION ─── */
    .catalogue {
      padding: 100px 32px;
      max-width: 900px;
      margin: 0 auto;
    }

    .cat-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 40px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    .cat-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 3px;
      color: var(--white);
    }

    .cat-count {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.25s;
    }
    .card:hover { border-color: #333; }

    .card-img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
      transition: transform 0.5s cubic-bezier(.4,0,.2,1);
      background: #141414;
    }
    .card:hover .card-img { transform: scale(1.04); }

    .card-body {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .card-name {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .card-price {
      font-size: 13px;
      font-weight: 600;
      color: var(--acid);
    }

    .card-add {
      display: block;
      width: 100%;
      padding: 12px;
      background: transparent;
      border: none;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s, color 0.2s;
    }
    .card-add:hover {
      background: var(--acid);
      color: var(--black);
      font-weight: 600;
    }

    .products-wrapper {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .products-wrapper .products {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .cat-more-btn {
      padding: 12px 20px;
      border: none;
      background: transparent;
      color: var(--acid);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.25s, color 0.25s;
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
      height: fit-content;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cat-more-btn:hover {
      transform: translateX(5px);
      color: var(--white);
    }
    .cat-more-btn::before {
      content: 'â†’';
      font-size: 16px;
      transition: transform 0.25s;
    }
    .cat-more-btn:hover::before {
      transform: translateX(3px);
    }

    .cat-divider { margin-bottom: 80px; }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--border);
      padding: 60px 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      justify-content: space-between;
      align-items: flex-start;
    }

    .footer-brand .logo {
      font-size: 40px;
      display: block;
      margin-bottom: 8px;
    }
    .footer-brand p {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .footer-social h4 {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .footer-social a {
      display: block;
      color: var(--white);
      text-decoration: none;
      font-size: 13px;
      margin-bottom: 8px;
      transition: color 0.2s;
    }
    .footer-social a:hover { color: var(--acid); }

    .footer-copy {
      width: 100%;
      padding-top: 32px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* ─── REGION SECTION ─── */
    .region-section {
      padding: 80px 32px;
      background: var(--black);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 60px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .region-header {
      text-align: center;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .region-title {
      font-family: 'Oswald', sans-serif;
      font-size: 32px;
      letter-spacing: 2px;
      color: var(--white);
      margin-bottom: 40px;
    }

    .region-selectors {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
      max-width: 500px;
    }

    .region-select {
      flex: 1;
      min-width: 180px;
      padding: 16px 24px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.25s, background 0.25s;
      text-align: center;
    }

    .region-select:hover {
      border-color: var(--acid);
      background: rgba(212, 255, 0, 0.05);
    }

    .region-select:focus {
      outline: none;
      border-color: var(--acid);
      background: rgba(212, 255, 0, 0.05);
    }

    .region-select option {
      background: var(--black);
      color: var(--white);
    }

    .payment-methods {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 20px;
      justify-items: center;
      width: 100%;
      max-width: 900px;
    }

    .payment-box {
      width: 100px;
      height: 65px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 1px;
      color: var(--white);
      transition: transform 0.2s;
      cursor: pointer;
      overflow: hidden;
    }

    .payment-box:hover {
      transform: scale(1.05);
    }

    .payment-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .payment-amex {
      background: #003DA5;
    }

    .payment-applepay {
      background: #f5f5f5;
    }

    .payment-carteblanche {
      background: #1ABC9C;
    }

    .payment-mastercard {
      background: #1A1F71;
    }

    .payment-paypal {
      background: #003087;
    }

    .payment-shop {
      background: #5A31F4;
    }

    .payment-visa {
      background: #1434CB;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 600px) {
      header { padding: 0 20px; }
      .catalogue { padding: 80px 16px; }
      footer { padding: 40px 20px; }
      .region-section { padding: 60px 16px; }
      .region-selectors { flex-direction: column; }
      .region-select { min-width: 100%; }
      .payment-methods { grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); }
      .payment-box { width: 80px; height: 55px; font-size: 10px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-title::before, .hero-title::after { animation: none; }
      .hero-scroll { animation: none; }
    }
  </style>
</head>
<body>

  <!-- OVERLAY -->
  <div class="sidebar-overlay" id="overlay" onclick="closeMenu()"></div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="menu">
    <nav>
      <button class="sidebar-cat-toggle" id="catToggle" onclick="toggleSidebarCatalogue()" data-i18n="sidebar-catalogue">Catalogue</button>
      <div class="sidebar-products" id="sidebarProducts">
        <a href="tous.html" onclick="closeMenu()" data-i18n="sidebar-tous">Tous</a>
        <a href="pulls.html" onclick="closeMenu()" data-i18n="sidebar-pulls">Pulls</a>
        <a href="vestes.html" onclick="closeMenu()" data-i18n="sidebar-vestes">Vestes</a>
        <a href="tshirts.html" onclick="closeMenu()" data-i18n="sidebar-tshirts">T-shirts</a>
        <a href="casquettes.html" onclick="closeMenu()" data-i18n="sidebar-casquettes">Casquettes</a>
      </div>
      <a href="contact.html" onclick="closeMenu()" class="sidebar-link" data-i18n="sidebar-contact">Contact</a>
    </nav>
    <div class="sidebar-footer">© 2025 Zynk</div>
  </div>

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="menu-btn" id="menuBtn" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </div>
      <div class="logo">Zynk</div>
    </div>
    <div class="header-right">
      <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Rechercher..." data-i18n-placeholder="search-placeholder">
        <button class="search-btn" aria-label="Rechercher" data-i18n-aria="search-label" onclick="toggleSearch()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
        </button>
      </div>
      <button class="cart-btn" aria-label="Panier" data-i18n-aria="cart-label" title="Panier" data-i18n-title="cart-title" onclick="openCart()">
        🛒
        <span class="cart-count">0</span>
      </button>
      <div class="account-menu" id="accountMenu">
        <button class="account-btn" aria-label="Compte" data-i18n-aria="account-label" title="Compte" data-i18n-title="account-title" onclick="toggleAccountMenu()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </button>
        <div class="account-dropdown" id="accountDropdown">
          <div class="account-dropdown-header" id="accountHeader"></div>
          <button class="account-dropdown-item" onclick="goToProfile()" data-i18n="account-profile">Mon compte</button>
          <button class="account-dropdown-item" onclick="handleLogout()" data-i18n="account-logout">Déconnexion</button>
        </div>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <p class="hero-eyebrow" data-i18n="hero-eyebrow">STREETWEAR PREMIUM</p>
      <h1 class="hero-title" data-i18n="hero-title">ZYNK</h1>
      <a href="tous.html" class="hero-cta" data-i18n="hero-cta">Voir la collection</a>
    </div>
    <div class="hero-scroll" data-i18n="hero-scroll">Scroll</div>
  </section>

  <!-- CATALOGUE -->
  <main class="catalogue" id="catalogue">
  </main>

  <!-- REGION SECTION -->
  <section class="region-section">
    <div class="region-header">
      <h2 class="region-title" data-i18n="region-title">Pays/région</h2>
      <div class="region-selectors">
        <select class="region-select" id="language">
          <option value="fr" data-i18n="language-fr">Français</option>
          <option value="en" data-i18n="language-en">English</option>
        </select>
        <select class="region-select" id="currency">
          <option value="eur" data-i18n="currency-eur">EUR €</option>
          <option value="usd" data-i18n="currency-usd">USD $</option>
        </select>
      </div>
    </div>

    <div class="payment-methods">
      <div class="payment-box payment-amex">
        <img src="image/american-express.png" alt="American Express">
      </div>
      <div class="payment-box payment-applepay">
        <img src="image/apple-pay.png" alt="Apple Pay">
      </div>
      <div class="payment-box payment-carteblanche">
        <img src="image/cb-carte.png" alt="Carte Bancaire">
      </div>
      <div class="payment-box payment-mastercard">
        <img src="image/mastercardlogo.png" alt="Mastercard">
      </div>
      <div class="payment-box payment-paypal">
        <img src="image/paypal.png" alt="PayPal">
      </div>
      <div class="payment-box payment-shop">
        <img src="image/shop.png" alt="Shop Pay">
      </div>
      <div class="payment-box payment-visa">
        <img src="image/visa.png" alt="Visa">
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-brand">
      <span class="logo">Zynk</span>
      <p data-i18n="footer-tagline">Streetwear Premium · Marseille</p>
    </div>
    <div class="footer-social">
      <h4 data-i18n="footer-social-title">Suivez-nous</h4>
      <a href="https://www.instagram.com/zynk_store.nimes?igsh=ZGx3M3J4cW0xMTR1&utm_source=qr" target="_blank" data-i18n="footer-instagram">Instagram · @zynk_store.nimes</a>
      <a href="https://tiktok.com/@mathis_spamz" target="_blank" data-i18n="footer-tiktok">TikTok · @mathis_spamz</a>
    </div>
    <p class="footer-copy" data-i18n="footer-copy">© 2025 Zynk. Tous droits réservés.</p>
  </footer>

  <script>
    // Auth Management
    function toggleAccountMenu() {
      const accountMenu = document.getElementById('accountMenu');
      accountMenu.classList.toggle('active');
    }

    function closeAccountMenu() {
      const accountMenu = document.getElementById('accountMenu');
      accountMenu.classList.remove('active');
    }

    function goToProfile() {
      window.location.href = 'compte.html';
    }

    function handleLogout() {
      localStorage.removeItem('currentUser');
      const lang = localStorage.getItem('selectedLanguage') || 'fr';
      const message = lang === 'en' ? 'See you soon!' : 'À bientôt !';
      showNotification(message);
      setTimeout(() => {
        window.location.reload();
      }, 1500);
    }

    function showNotification(message) {
      const notification = document.createElement('div');
      notification.style.cssText = `
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--acid);
        color: var(--black);
        padding: 16px 32px;
        border-radius: 4px;
        font-weight: 600;
        z-index: 1000;
        animation: slide-down 0.4s ease-out;
      `;
      notification.textContent = message;
      document.body.appendChild(notification);
      setTimeout(() => {
        notification.remove();
      }, 4000);
    }

    function updateAccountUI() {
      const currentUser = JSON.parse(localStorage.getItem('currentUser'));
      const accountHeader = document.getElementById('accountHeader');
      const accountDropdown = document.getElementById('accountDropdown');

      if (currentUser) {
        accountHeader.innerHTML = `
          <div class="account-dropdown-name">${currentUser.firstName} ${currentUser.lastName}</div>
          <div class="account-dropdown-email">${currentUser.email}</div>
        `;
        accountDropdown.innerHTML = `
          <button class="account-dropdown-item" onclick="goToProfile()">Mon compte</button>
          <button class="account-dropdown-item" onclick="handleLogout()">Déconnexion</button>
        `;
      } else {
        const lang = localStorage.getItem('selectedLanguage') || 'fr';
        const loginText = lang === 'en' ? 'Sign In' : 'Se connecter';
        const signupText = lang === 'en' ? 'Sign Up' : 'S\'inscrire';
        accountHeader.innerHTML = '';
        accountDropdown.innerHTML = `
          <a href="login.html" class="account-dropdown-item" style="text-decoration: none; display: block;">${loginText}</a>
          <a href="inscription.html" class="account-dropdown-item" style="text-decoration: none; display: block; border-bottom: none;">${signupText}</a>
        `;
      }
    }

    // Fermer le menu au clic en dehors
    document.addEventListener('click', function(e) {
      const accountMenu = document.getElementById('accountMenu');
      if (!accountMenu.contains(e.target)) {
        closeAccountMenu();
      }
    });

    // Translations Dictionary
    const translations = {
      fr: {
        'hero-eyebrow': 'STREETWEAR PREMIUM',
        'hero-title': 'ZYNK',
        'hero-cta': 'Voir la collection',
        'hero-scroll': 'Scroll',
        'sidebar-catalogue': 'Catalogue',
        'sidebar-tous': 'Tous',
        'sidebar-pulls': 'Pulls',
        'sidebar-vestes': 'Vestes',
        'sidebar-tshirts': 'T-shirts',
        'sidebar-casquettes': 'Casquettes',
        'sidebar-contact': 'Contact',
        'region-title': 'Pays/région',
        'language-fr': 'Français',
        'language-en': 'English',
        'currency-eur': 'EUR €',
        'currency-usd': 'USD $',
        'footer-tagline': 'Streetwear Premium · Marseille',
        'footer-social-title': 'Suivez-nous',
        'footer-instagram': 'Instagram · @mathis_spamz',
        'footer-tiktok': 'TikTok · @mathis_spamz',
        'footer-copy': '© 2025 Zynk. Tous droits réservés.',
        'search-placeholder': 'Rechercher...',
        'search-label': 'Rechercher',
        'cart-label': 'Panier',
        'cart-title': 'Panier',
        'account-label': 'Compte',
        'account-title': 'Compte',
        'account-profile': 'Mon compte',
        'account-logout': 'Déconnexion'
      },
      en: {
        'hero-eyebrow': 'PREMIUM STREETWEAR',
        'hero-title': 'ZYNK',
        'hero-cta': 'View collection',
        'hero-scroll': 'Scroll',
        'sidebar-catalogue': 'Catalog',
        'sidebar-tous': 'All',
        'sidebar-pulls': 'Sweaters',
        'sidebar-vestes': 'Jackets',
        'sidebar-tshirts': 'T-shirts',
        'sidebar-casquettes': 'Caps',
        'sidebar-contact': 'Contact',
        'region-title': 'Country/Region',
        'language-fr': 'French',
        'language-en': 'English',
        'currency-eur': 'EUR €',
        'currency-usd': 'USD $',
        'footer-tagline': 'Premium Streetwear · Marseille',
        'footer-social-title': 'Follow us',
        'footer-instagram': 'Instagram · @mathis_spamz',
        'footer-tiktok': 'TikTok · @mathis_spamz',
        'footer-copy': '© 2025 Zynk. All rights reserved.',
        'search-placeholder': 'Search...',
        'search-label': 'Search',
        'cart-label': 'Cart',
        'cart-title': 'Cart',
        'account-label': 'Account',
        'account-title': 'Account',
        'account-profile': 'My Account',
        'account-logout': 'Sign Out'
      }
    };

    // Language Management
    function setLanguage(lang) {
      localStorage.setItem('selectedLanguage', lang);
      applyTranslations(lang);
    }

    function applyTranslations(lang) {
      const trans = translations[lang];
      // Apply text content
      Object.keys(trans).forEach(key => {
        const elements = document.querySelectorAll(`[data-i18n="${key}"]`);
        elements.forEach(element => {
          element.textContent = trans[key];
        });
      });
      // Apply placeholders
      const placeholders = document.querySelectorAll('[data-i18n-placeholder]');
      placeholders.forEach(element => {
        const key = element.getAttribute('data-i18n-placeholder');
        if (trans[key]) {
          element.placeholder = trans[key];
        }
      });
      // Apply aria-labels
      const ariaLabels = document.querySelectorAll('[data-i18n-aria]');
      ariaLabels.forEach(element => {
        const key = element.getAttribute('data-i18n-aria');
        if (trans[key]) {
          element.setAttribute('aria-label', trans[key]);
        }
      });
      // Apply titles
      const titles = document.querySelectorAll('[data-i18n-title]');
      titles.forEach(element => {
        const key = element.getAttribute('data-i18n-title');
        if (trans[key]) {
          element.setAttribute('title', trans[key]);
        }
      });
    }

    // Currency Management
    const EUR_TO_USD = 1.14;

    function setCurrency(currency) {
      localStorage.setItem('selectedCurrency', currency);
    }

    function getCurrency() {
      return localStorage.getItem('selectedCurrency') || 'eur';
    }

    // Initialize language and currency from localStorage
    function initLanguage() {
      const savedLanguage = localStorage.getItem('selectedLanguage') || 'fr';

      // Check if this is the first time ever visiting (not a refresh)
      let savedCurrency = localStorage.getItem('selectedCurrency');

      if (!localStorage.getItem('hasVisitedBefore')) {
        // First load ever: set EUR by default
        savedCurrency = 'eur';
        localStorage.setItem('selectedCurrency', 'eur');
        localStorage.setItem('hasVisitedBefore', 'true');
      } else if (!savedCurrency) {
        // Refresh or new tab: use EUR as fallback
        savedCurrency = 'eur';
      }

      document.getElementById('language').value = savedLanguage;
      document.getElementById('currency').value = savedCurrency;
      applyTranslations(savedLanguage);
    }

    // Language selector change
    document.addEventListener('DOMContentLoaded', function() {
      updateAccountUI();
      initLanguage();
      document.getElementById('language').addEventListener('change', function(e) {
        setLanguage(e.target.value);
      });
      document.getElementById('currency').addEventListener('change', function(e) {
        setCurrency(e.target.value);
        location.reload();
      });
    });

    // Sidebar Catalogue Toggle
    function toggleSidebarCatalogue() {
      const btn = document.getElementById('catToggle');
      const products = document.getElementById('sidebarProducts');
      btn.classList.toggle('active');
      products.classList.toggle('active');
    }

    // Menu
    function toggleMenu() {
      const menu = document.getElementById('menu');
      const btn = document.getElementById('menuBtn');
      const overlay = document.getElementById('overlay');
      menu.classList.toggle('active');
      btn.classList.toggle('open');
      overlay.classList.toggle('active');
    }
    function closeMenu() {
      document.getElementById('menu').classList.remove('active');
      document.getElementById('menuBtn').classList.remove('open');
      document.getElementById('overlay').classList.remove('active');
    }

    // Panier
    function getCart() {
      const cart = localStorage.getItem('cart');
      return cart ? JSON.parse(cart) : [];
    }

    function saveCart(cart) {
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    function addToCart(btn) {
      const card = btn.closest('.card');
      const name = card.querySelector('.card-name').textContent;
      const priceText = card.querySelector('.card-price').textContent;

      // Toujours stocker le prix original en EUR
      let originalPrice = priceText;
      const currency = getCurrency ? getCurrency() : 'eur';
      if (currency === 'usd') {
        const usdPrice = parseFloat(priceText.replace('$', '').trim());
        const eurPrice = usdPrice / EUR_TO_USD;
        originalPrice = eurPrice.toFixed(2) + ' €';
      }

      const cart = getCart();
      const item = { name, price: originalPrice, id: Date.now() };
      cart.push(item);
      saveCart(cart);

      updateCartCount();
      const lang = localStorage.getItem('selectedLanguage') || 'fr';
      const addedText = lang === 'en' ? 'âœ“ Added' : 'âœ“ Ajouté';
      const addText = lang === 'en' ? 'Add to cart' : 'Ajouter au panier';
      btn.textContent = addedText;
      btn.style.color = 'var(--acid)';
      setTimeout(() => {
        btn.textContent = addText;
        btn.style.color = '';
      }, 1500);
    }

    function updateCartCount() {
      const cart = getCart();
      document.querySelector('.cart-count').textContent = cart.length;
    }

    function openCart() {
      window.location.href = 'panier.html';
    }

    // Initialiser le compteur
    updateCartCount();

    // Search functionality
    function toggleSearch() {
      const searchInput = document.getElementById('searchInput');
      searchInput.focus();
    }

    function performSearch(query) {
      const searchTerm = query.toLowerCase().trim();

      const categoryMap = {
        'pulls': 'pulls.html',
        'pull': 'pulls.html',
        'vestes': 'vestes.html',
        'veste': 'vestes.html',
        'jacket': 'vestes.html',
        'jackets': 'vestes.html',
        't-shirts': 'tshirts.html',
        'tshirts': 'tshirts.html',
        't-shirt': 'tshirts.html',
        'tshirt': 'tshirts.html',
        'shirt': 'tshirts.html',
        'shirts': 'tshirts.html',
        'casquettes': 'casquettes.html',
        'casquette': 'casquettes.html',
        'caps': 'casquettes.html',
        'cap': 'casquettes.html',
        'tous': 'tous.html',
        'all': 'tous.html'
      };

      if (categoryMap[searchTerm]) {
        window.location.href = categoryMap[searchTerm];
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      const searchInput = document.getElementById('searchInput');

      searchInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          performSearch(this.value);
        }
      });
    });
  </script>

</body>
</html>
