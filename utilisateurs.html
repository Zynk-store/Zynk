<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion des Utilisateurs - Zynk Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #000;
      --white: #fff;
      --acid: #D4FF00;
      --card-bg: #0f0f0f;
      --border: #1c1c1c;
      --muted: #555;
    }
    body {
      background: var(--black);
      color: var(--white);
      font-family: ''Inter'', sans-serif;
      padding: 40px 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header h1 {
      font-family: ''Bebas Neue'', sans-serif;
      font-size: 36px;
      letter-spacing: 3px;
      color: var(--acid);
      margin-bottom: 10px;
    }
    .header p {
      color: var(--muted);
      font-size: 14px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-number {
      font-size: 48px;
      font-weight: bold;
      color: var(--acid);
      margin-bottom: 10px;
    }
    .stat-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.2s;
      font-family: ''Inter'', sans-serif;
      background: var(--acid);
      color: var(--black);
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white);
    }
    .btn-secondary:hover {
      border-color: var(--acid);
      color: var(--acid);
    }
    .table-container {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: rgba(212, 255, 0, 0.05);
      padding: 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--acid);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    tr:last-child td {
      border-bottom: none;
    }
    tr:hover {
      background: rgba(212, 255, 0, 0.02);
    }
    .user-name {
      font-weight: 600;
      color: var(--white);
    }
    .user-email {
      color: var(--muted);
      font-size: 12px;
    }
    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--acid);
      text-decoration: none;
      font-size: 12px;
    }
    .back-link:hover {
      color: var(--white);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>GESTION DES UTILISATEURS</h1>
      <p>Liste de tous les comptes inscrits sur Zynk</p>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-number" id="totalUsers">0</div>
        <div class="stat-label">Utilisateurs inscrits</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="totalToday">0</div>
        <div class="stat-label">Inscrits aujourd''hui</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn" onclick="rafraichir()">🔄 Actualiser</button>
      <button class="btn btn-secondary" onclick="exportJSON()">📥 JSON</button>
      <button class="btn btn-secondary" onclick="exportCSV()">📊 CSV</button>
      <button class="btn btn-secondary" onclick="window.print()">🖨️ Imprimer</button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Prénom</th>
            <th>Nom</th>
            <th>Email</th>
            <th>Date d''inscription</th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <tr>
            <td colspan="5" style="text-align: center; padding: 40px;">
              <div class="empty-state">
                <p>Chargement...</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <a href="../index.html" class="back-link">← Retour au site principal</a>
  </div>

  <script>
    let allUsers = [];

    function loadUsers() {
      const stored = localStorage.getItem(''zynkUsers'');
      
      if (!stored) {
        allUsers = [];
      } else {
        try {
          allUsers = JSON.parse(stored);
        } catch (e) {
          allUsers = [];
        }
      }

      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById(''usersTableBody'');
      document.getElementById(''totalUsers'').textContent = allUsers.length;

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const usersToday = allUsers.filter(user => {
        const userDate = new Date(user.createdAt);
        userDate.setHours(0, 0, 0, 0);
        return userDate.getTime() === today.getTime();
      }).length;
      document.getElementById(''totalToday'').textContent = usersToday;

      if (allUsers.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 40px;"><div class="empty-state"><p>Aucun utilisateur inscrit</p></div></td></tr>`;
        return;
      }

      const sorted = [...allUsers].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

      let html = '''';
      sorted.forEach((user, index) => {
        const date = new Date(user.createdAt);
        const formattedDate = date.toLocaleDateString(''fr-FR'', {
          year: ''numeric'',
          month: ''long'',
          day: ''numeric'',
          hour: ''2-digit'',
          minute: ''2-digit''
        });

        html += `<tr>
          <td style="color: var(--muted);">${index + 1}</td>
          <td class="user-name">${user.firstName}</td>
          <td class="user-name">${user.lastName}</td>
          <td class="user-email">${user.email}</td>
          <td>${formattedDate}</td>
        </tr>`;
      });

      tbody.innerHTML = html;
    }

    function rafraichir() {
      loadUsers();
    }

    function exportJSON() {
      const dataStr = JSON.stringify(allUsers, null, 2);
      const element = document.createElement(''a'');
      element.setAttribute(''href'', ''data:application/json;charset=utf-8,'' + encodeURIComponent(dataStr));
      element.setAttribute(''download'', ''utilisateurs.json'');
      element.style.display = ''none'';
      document.body.appendChild(element);
      element.click();
      document.body.removeChild(element);
    }

    function exportCSV() {
      let csv = ''Prénom,Nom,Email,Date d\\''inscription\n'';
      allUsers.forEach(user => {
        const date = new Date(user.createdAt).toLocaleDateString(''fr-FR'');
        csv += `"${user.firstName}","${user.lastName}","${user.email}","${date}"\n`;
      });
      const element = document.createElement(''a'');
      element.setAttribute(''href'', ''data:text/csv;charset=utf-8,'' + encodeURIComponent(csv));
      element.setAttribute(''download'', ''utilisateurs.csv'');
      element.style.display = ''none'';
      document.body.appendChild(element);
      element.click();
      document.body.removeChild(element);
    }

    // Charger au démarrage
    loadUsers();

    // Recharger toutes les 1 seconde
    setInterval(loadUsers, 1000);
  </script>

</body>
</html>
