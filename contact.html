<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact  Zynk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000;
      --white: #fff;
      --acid: #D4FF00;
      --card-bg: #0f0f0f;
      --border: #1c1c1c;
      --muted: #555;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      letter-spacing: 0.01em;
      overflow-x: hidden;
    }

    /*  HEADER  */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 32px;
      height: 60px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 300;
    }

    .header-left { display: flex; align-items: center; gap: 20px; }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 4px;
      color: var(--white);
      text-decoration: none;
    }

    .header-right { display: flex; align-items: center; gap: 16px; }

    .search-container {
      display: flex;
      align-items: center;
      background: transparent;
      border: 1px solid var(--white);
      border-radius: 6px;
      padding: 0 8px;
      transition: border-color 0.25s;
    }

    .search-container:focus-within {
      border-color: var(--acid);
    }

    .search-input {
      background: transparent;
      border: none;
      color: var(--white);
      font-size: 13px;
      padding: 8px 8px;
      width: 150px;
      font-family: 'Inter', sans-serif;
      outline: none;
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    .search-btn {
      background: none;
      border: none;
      color: var(--white);
      cursor: pointer;
      font-size: 16px;
      transition: color 0.2s;
      padding: 4px 4px;
    }

    .search-btn:hover {
      color: var(--acid);
    }

    .cart-btn {
      background: none; border: none; color: var(--white);
      cursor: pointer; font-size: 18px;
      position: relative;
    }
    .cart-count {
      position: absolute;
      top: -6px; right: -8px;
      background: var(--acid);
      color: var(--black);
      font-size: 9px;
      font-weight: 700;
      width: 16px; height: 16px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    .account-btn {
      background: none; border: none; color: var(--white);
      cursor: pointer; font-size: 18px;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      outline: none;
    }
    .account-btn:hover svg {
      stroke: var(--acid);
    }
    .account-btn:focus {
      outline: none;
    }

    /*  CONTENT  */
    .content {
      padding: 100px 32px;
      max-width: 600px;
      margin: 0 auto;
      margin-top: 20px;
    }

    .page-header {
      margin-bottom: 50px;
      text-align: center;
      border-bottom: 2px solid var(--acid);
      padding-bottom: 30px;
    }

    .page-title {
      font-family: 'Oswald', sans-serif;
      font-size: 48px;
      letter-spacing: 3px;
      color: var(--white);
      margin-bottom: 10px;
    }

    /*  FORM  */
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .form-group input,
    .form-group textarea {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: border-color 0.25s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--acid);
      background: rgba(212, 255, 0, 0.05);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 150px;
    }

    .form-group textarea::placeholder,
    .form-group input::placeholder {
      color: var(--muted);
    }

    .submit-btn {
      align-self: flex-start;
      padding: 14px 40px;
      background: transparent;
      border: 1px solid var(--acid);
      color: var(--acid);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.25s, color 0.25s;
      margin-top: 20px;
    }

    .submit-btn:hover {
      background: var(--acid);
      color: var(--black);
    }

    .back-link {
      display: inline-block;
      margin-top: 40px;
      padding: 12px 24px;
      border: 1px solid var(--acid);
      color: var(--acid);
      text-decoration: none;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: background 0.25s, color 0.25s;
      background: transparent;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .back-link:hover {
      background: var(--acid);
      color: var(--black);
    }

    /*  FOOTER  */
    footer {
      border-top: 1px solid var(--border);
      padding: 60px 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      justify-content: space-between;
      align-items: flex-start;
      margin-top: 80px;
    }

    .footer-brand .logo {
      font-size: 40px;
      display: block;
      margin-bottom: 8px;
    }
    .footer-brand p {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .footer-social h4 {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .footer-social a {
      display: block;
      color: var(--white);
      text-decoration: none;
      font-size: 13px;
      margin-bottom: 8px;
      transition: color 0.2s;
    }
    .footer-social a:hover { color: var(--acid); }

    .footer-copy {
      width: 100%;
      padding-top: 32px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    @media (max-width: 600px) {
      header { padding: 0 20px; }
      .content { padding: 80px 16px; }
      footer { padding: 40px 20px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <a href="index.html" class="logo">Zynk</a>
    </div>
    <div class="header-right">
      <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Rechercher...">
        <button class="search-btn" aria-label="Rechercher" onclick="toggleSearch()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
        </button>
      </div>
      <button class="cart-btn" aria-label="Panier" title="Panier" onclick="openCart()">
        🛒
        <span class="cart-count">0</span>
      </button>
      <button class="account-btn" aria-label="S'identifier" title="S'identifier" onclick="window.location.href='login.html'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </button>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="content">
    <div class="page-header">
      <h1 class="page-title" data-i18n="contact-title">Contact-nous</h1>
    </div>

    <form class="contact-form" onsubmit="handleSubmit(event)">
      <div class="form-group">
        <label for="name" data-i18n="form-name">Nom et Prénom</label>
        <input type="text" id="name" name="name" required placeholder="John Doe" data-i18n-placeholder="placeholder-name">
      </div>

      <div class="form-group">
        <label for="email" data-i18n="form-email">Email</label>
        <input type="email" id="email" name="email" required placeholder="john@example.com" data-i18n-placeholder="placeholder-email">
      </div>

      <div class="form-group">
        <label for="phone" data-i18n="form-phone">Numéro de téléphone</label>
        <input type="tel" id="phone" name="phone" placeholder="+33 6 12 34 56 78" data-i18n-placeholder="placeholder-phone">
      </div>

      <div class="form-group">
        <label for="message" data-i18n="form-message">Commentaire</label>
        <textarea id="message" name="message" required placeholder="Votre message ici..." data-i18n-placeholder="placeholder-message"></textarea>
      </div>

      <button type="submit" class="submit-btn" data-i18n="form-submit">Envoyer</button>
    </form>

    <button class="back-link" onclick="history.back()" data-i18n="btn-back"> Retour</button>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="footer-brand">
      <span class="logo">Zynk</span>
      <p data-i18n="footer-tagline">Streetwear Premium  Marseille</p>
    </div>
    <div class="footer-social">
      <h4 data-i18n="footer-social-title">Suivez-nous</h4>
      <a href="https://instagram.com/mathis_spamz" target="_blank">Instagram · @mathis_spamz</a>
      <a href="https://tiktok.com/@mathis_spamz" target="_blank">TikTok · @mathis_spamz</a>
    </div>
    <p class="footer-copy" data-i18n="footer-copy"> 2025 Zynk. Tous droits réservés.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script>
    // EmailJS Configuration
    // Note: You need to replace these with your actual EmailJS credentials
    // Go to https://www.emailjs.com/ to get your public key and set up your email service
    const EMAILJS_PUBLIC_KEY = 'YOUR_PUBLIC_KEY_HERE'; // Replace with your EmailJS public key
    const EMAILJS_SERVICE_ID = 'service_zynk_contact'; // Service ID (you'll set this up in EmailJS)
    const EMAILJS_TEMPLATE_ID = 'template_zynk_contact'; // Template ID (you'll set this up in EmailJS)

    // Initialize EmailJS (optional - only if you've set up your public key)
    if (EMAILJS_PUBLIC_KEY !== 'YOUR_PUBLIC_KEY_HERE') {
      emailjs.init(EMAILJS_PUBLIC_KEY);
    }

    // Translations Dictionary
    const translations = {
      fr: {
        'contact-title': 'Contact-nous',
        'form-name': 'Nom et Prénom',
        'form-email': 'Email',
        'form-phone': 'Numéro de téléphone',
        'form-message': 'Commentaire',
        'form-submit': 'Envoyer',
        'btn-back': ' Retour',
        'footer-tagline': 'Streetwear Premium  Marseille',
        'footer-social-title': 'Suivez-nous',
        'footer-copy': ' 2025 Zynk. Tous droits réservés.',
        'placeholder-name': 'John Doe',
        'placeholder-email': 'john@example.com',
        'placeholder-phone': '+33 6 12 34 56 78',
        'placeholder-message': 'Votre message ici...',
        'alert-success': 'Merci {name}! Votre message a été envoyé avec succès.',
        'alert-error': 'Une erreur est survenue. Veuillez réessayer.'
      },
      en: {
        'contact-title': 'Contact us',
        'form-name': 'Full Name',
        'form-email': 'Email',
        'form-phone': 'Phone Number',
        'form-message': 'Message',
        'form-submit': 'Send',
        'btn-back': ' Back',
        'footer-tagline': 'Premium Streetwear  Marseille',
        'footer-social-title': 'Follow us',
        'footer-copy': ' 2025 Zynk. All rights reserved.',
        'placeholder-name': 'John Doe',
        'placeholder-email': 'john@example.com',
        'placeholder-phone': '+1 (555) 123-4567',
        'placeholder-message': 'Your message here...',
        'alert-success': 'Thank you {name}! Your message has been sent successfully.',
        'alert-error': 'An error occurred. Please try again.'
      }
    };

    function applyTranslations(lang) {
      const trans = translations[lang];
      // Apply text content
      Object.keys(trans).forEach(key => {
        if (!key.includes('placeholder') && key !== 'alert-success') {
          const elements = document.querySelectorAll(`[data-i18n="${key}"]`);
          elements.forEach(element => {
            element.textContent = trans[key];
          });
        }
      });
      // Apply placeholders
      const placeholders = document.querySelectorAll('[data-i18n-placeholder]');
      placeholders.forEach(element => {
        const key = element.getAttribute('data-i18n-placeholder');
        if (trans[key]) {
          element.placeholder = trans[key];
        }
      });
    }

    function initLanguage() {
      const savedLanguage = localStorage.getItem('selectedLanguage') || 'fr';
      applyTranslations(savedLanguage);
      document.documentElement.lang = savedLanguage;
    }

    document.addEventListener('DOMContentLoaded', function() {
      initLanguage();
      updateCartCount();
    });

    function showNotification(message) {
      const notification = document.createElement('div');
      notification.style.cssText = `
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #D4FF00;
        color: #000;
        padding: 16px 32px;
        border-radius: 4px;
        font-weight: 600;
        z-index: 1000;
        animation: slideDown 0.4s ease-out;
      `;
      notification.textContent = message;
      document.body.appendChild(notification);

      // Add animation
      const style = document.createElement('style');
      style.textContent = `
        @keyframes slideDown {
          from {
            opacity: 0;
            transform: translateX(-50%) translateY(-20px);
          }
          to {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
          }
        }
      `;
      document.head.appendChild(style);

      setTimeout(() => notification.remove(), 4000);
    }

    function handleSubmit(event) {
      event.preventDefault();
      const lang = localStorage.getItem('selectedLanguage') || 'fr';
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const message = document.getElementById('message').value;

      // Check if EmailJS is configured
      if (EMAILJS_PUBLIC_KEY === 'YOUR_PUBLIC_KEY_HERE') {
        alert(' EmailJS n\'est pas configuré. Veuillez contacter l\'administrateur.');
        return;
      }

      // Prepare email data
      const templateParams = {
        to_email: 'Mathissou.store@gmail.com',
        from_name: name,
        from_email: email,
        phone_number: phone,
        message: message
      };

      // Show loading state
      const submitBtn = event.target.querySelector('.submit-btn');
      const originalText = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.textContent = lang === 'en' ? 'Sending...' : 'Envoi...';

      // Send email using EmailJS
      emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams)
        .then(function(response) {
          const successMessage = translations[lang]['alert-success'].replace('{name}', name);
          showNotification(successMessage);
          event.target.reset();
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        })
        .catch(function(error) {
          const errorMessage = translations[lang]['alert-error'];
          showNotification(errorMessage);
          console.error('Email error:', error);
          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        });
    }

    function getCart() {
      const cart = localStorage.getItem('cart');
      return cart ? JSON.parse(cart) : [];
    }

    function updateCartCount() {
      const cart = getCart();
      document.querySelector('.cart-count').textContent = cart.length;
    }

    function openCart() {
      window.location.href = 'panier.html';
    }

    function toggleSearch() {
      const searchInput = document.getElementById('searchInput');
      searchInput.focus();
    }

    function performSearch(query) {
      const searchTerm = query.toLowerCase().trim();
      const categoryMap = {
        'pulls': 'pulls.html',
        'pull': 'pulls.html',
        'vestes': 'vestes.html',
        'veste': 'vestes.html',
        'jacket': 'vestes.html',
        'jackets': 'vestes.html',
        't-shirts': 'tshirts.html',
        'tshirts': 'tshirts.html',
        't-shirt': 'tshirts.html',
        'tshirt': 'tshirts.html',
        'shirt': 'tshirts.html',
        'shirts': 'tshirts.html',
        'casquettes': 'casquettes.html',
        'casquette': 'casquettes.html',
        'caps': 'casquettes.html',
        'cap': 'casquettes.html',
        'tous': 'tous.html',
        'all': 'tous.html'
      };

      if (categoryMap[searchTerm]) {
        window.location.href = categoryMap[searchTerm];
      }
    }

    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        performSearch(this.value);
      }
    });
  </script>

</body>
</html>
